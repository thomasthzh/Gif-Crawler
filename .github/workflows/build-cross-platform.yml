name: Build Cross Platform

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller pillow

      - name: Build icon
        run: python make_win_icon.py

      - name: Build GUI exe
        run: python build_gui.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GIF-Crawler-Windows
          path: dist/GIF-Crawler-Windows.exe
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller

      - name: Build GUI binary
        run: python build_gui.py

      - name: Make executable
        run: chmod +x dist/GIF-Crawler-Linux

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GIF-Crawler-Linux
          path: dist/GIF-Crawler-Linux
          if-no-files-found: error
